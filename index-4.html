<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Invitation Gaby - 40 ans</title>
<style>
  body{margin:0;font-family:Georgia,'Times New Roman',serif;}
  .wrap{background:#f5a9c2;width:640px;max-width:100%;margin:0 auto;color:#c81e2c;padding:56px 48px 64px;box-sizing:border-box;}
  input[type=text]{border:none;background:transparent;font-family:Helvetica,Arial,sans-serif;font-size:14px;color:#c81e2c;font-weight:700;outline:none;width:100%;}
  .guest-row{display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #c81e2c55;}
  .guest-row label{display:flex;align-items:center;gap:6px;font-size:12px;font-family:Helvetica,Arial,sans-serif;}
  .saved{font-size:11px;font-family:Helvetica,Arial,sans-serif;color:#2c9c3a;font-weight:700;opacity:0;transition:opacity .3s;}
  .saved.show{opacity:1;}
  button{cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div style="text-align:center;font-size:88px;font-weight:400;font-style:italic;letter-spacing:-2px;line-height:1;margin-bottom:40px;">forty.</div>

  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
    <div style="flex:1;height:1px;background:#c81e2c;"></div>
    <div style="font-size:13px;letter-spacing:2px;font-family:Helvetica,Arial,sans-serif;white-space:nowrap;">WEEK-END FESTIF POUR</div>
    <div style="flex:1;height:1px;background:#c81e2c;"></div>
  </div>

  <div style="text-align:center;font-family:Helvetica,Arial,sans-serif;font-weight:800;font-size:26px;letter-spacing:0.5px;margin-bottom:32px;">LE 40IÈME ANNIVERSAIRE DE GABI</div>

  <div style="display:flex;border-top:1px solid #c81e2c;border-bottom:1px solid #c81e2c;padding:20px 0;margin-bottom:36px;">
    <div style="font-size:56px;font-weight:400;line-height:1;flex-shrink:0;">25</div>
    <div style="font-family:Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;writing-mode:vertical-rl;text-orientation:mixed;padding:0 16px;">JUILLET</div>
    <div style="border-left:1px solid #c81e2c;padding-left:20px;font-family:Helvetica,Arial,sans-serif;font-weight:700;font-size:15px;letter-spacing:0.5px;line-height:1.8;align-self:center;">
      39 CHEMIN BLANC, STONEHAM<br>
      ARRIVÉE À 16H — SOUPER À THÈME<br>
      POSSIBILITÉ DE DORMIR SUR PLACE<br>
      DISPO DU 24 AU 26 JUILLET
    </div>
  </div>

  <div style="background:#ffffff33;border:1px solid #c81e2c;padding:20px 24px;margin-bottom:24px;font-family:Helvetica,Arial,sans-serif;">
    <div style="font-weight:800;font-size:14px;letter-spacing:1px;margin-bottom:14px;">CONFIRME TA PRÉSENCE :</div>
    <div id="guestList"></div>
    <button id="addBtn" style="margin-top:12px;background:none;border:1px dashed #c81e2c;color:#c81e2c;font-family:Helvetica,Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:8px 14px;">+ AJOUTER UN INVITÉ</button>
    <div style="margin-top:16px;padding-top:14px;border-top:2px solid #c81e2c;display:flex;justify-content:space-between;font-size:13px;font-weight:800;letter-spacing:0.5px;">
      <span id="totalVient">0 viennent au souper</span>
      <span id="totalCouche">0 couchent sur place</span>
    </div>
  </div>

  <div style="text-align:center;font-family:Helvetica,Arial,sans-serif;font-size:22px;">
    <span style="font-weight:800;">RSVP</span> 418 952 6611
  </div>
</div>

<!-- Iframe cachée + form pour soumission Google Forms sans CORS -->
<iframe name="ghostFrame" style="display:none" aria-hidden="true"></iframe>
<form id="ghostForm" action="https://docs.google.com/forms/d/e/1FAIpQLSc5iG-5uVKDeDhvdmWjawac7xuEJgQoob1KFIsBKipcyjFu_w/formResponse" method="POST" target="ghostFrame" style="display:none">
  <input type="text" name="entry.2005620554" id="fName">
  <input type="text" name="entry.1166974658" id="fVient">
  <input type="text" name="entry.1045781291" id="fCouche">
</form>

<script>
let guests = [{name:"",vient:false,couche:false}];
const timers = {};

function render(){
  const list = document.getElementById('guestList');
  list.innerHTML = '';
  guests.forEach((g,i)=>{
    const row = document.createElement('div');
    row.className = 'guest-row';
    row.innerHTML = `
      <input type="text" placeholder="Nom" value="${g.name.replace(/"/g,'&quot;')}" data-i="${i}" class="nameInput">
      <label><input type="checkbox" data-i="${i}" class="vientCb" ${g.vient?'checked':''}>Souper 16h</label>
      <label><input type="checkbox" data-i="${i}" class="coucheCb" ${g.couche?'checked':''}>Couche</label>
      <span class="saved" data-i="${i}">✓ enregistré</span>
      <button data-i="${i}" class="rmBtn" style="background:none;border:none;color:#c81e2c;font-size:16px;">×</button>
    `;
    list.appendChild(row);
  });
  document.querySelectorAll('.nameInput').forEach(el=>el.addEventListener('input',e=>{
    guests[+e.target.dataset.i].name = e.target.value;
    scheduleSubmit(+e.target.dataset.i);
  }));
  document.querySelectorAll('.vientCb').forEach(el=>el.addEventListener('change',e=>{
    guests[+e.target.dataset.i].vient = e.target.checked; updateTotals();
    scheduleSubmit(+e.target.dataset.i);
  }));
  document.querySelectorAll('.coucheCb').forEach(el=>el.addEventListener('change',e=>{
    guests[+e.target.dataset.i].couche = e.target.checked; updateTotals();
    scheduleSubmit(+e.target.dataset.i);
  }));
  document.querySelectorAll('.rmBtn').forEach(el=>el.addEventListener('click',e=>{
    guests.splice(+e.target.dataset.i,1); render(); updateTotals();
  }));
  updateTotals();
}

function updateTotals(){
  document.getElementById('totalVient').textContent = guests.filter(g=>g.vient).length + ' viennent au souper';
  document.getElementById('totalCouche').textContent = guests.filter(g=>g.couche).length + ' couchent sur place';
}

// Debounce : attend 800ms après le dernier changement avant d'envoyer
function scheduleSubmit(i){
  if(timers[i]) clearTimeout(timers[i]);
  timers[i] = setTimeout(()=>submitGuest(i), 800);
}

function submitGuest(i){
  const g = guests[i];
  if(!g || !g.name.trim()) return;
  document.getElementById('fName').value = g.name.trim();
  document.getElementById('fVient').value = g.vient ? 'OUI' : 'NON';
  document.getElementById('fCouche').value = g.couche ? 'OUI' : 'NON';
  document.getElementById('ghostForm').submit();
  // Feedback visuel
  const badge = document.querySelector(`.saved[data-i="${i}"]`);
  if(badge){
    badge.classList.add('show');
    setTimeout(()=>badge.classList.remove('show'), 2500);
  }
}

document.getElementById('addBtn').addEventListener('click',()=>{
  guests.push({name:"",vient:false,couche:false});
  render();
});
render();
</script>
</body>
</html>
